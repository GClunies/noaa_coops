name: Bug report
description: Something isn't working as expected.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: >
        A clear description of what you expected vs. what actually happened.
      placeholder: |
        I called Station.get_data(...) for 2015 water levels and got …
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal Python snippet that reproduces the issue.
      render: python
      placeholder: |
        from noaa_coops import Station
        seattle = Station(id="9447130")
        df = seattle.get_data(
            begin_date="20150101",
            end_date="20150131",
            product="water_level",
            datum="MLLW",
            units="metric",
            time_zone="gmt",
        )
    validations:
      required: true

  - type: input
    id: noaa-coops-version
    attributes:
      label: noaa-coops version
      placeholder: "0.5.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: "Python 3.12.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14 / Ubuntu 24.04 / Windows 11 / ..."

  - type: textarea
    id: traceback
    attributes:
      label: Full traceback (if applicable)
      render: text
